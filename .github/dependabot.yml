version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      types:
        patterns:
          - "@types/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "typescript-eslint"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      # Bundle every non-major production-dep bump into a single weekly PR.
      # Without this, each of @modelcontextprotocol/sdk, chrome-remote-interface,
      # ws, zod, @vscode/debugadapter, @vscode/debugprotocol,
      # @jridgewell/trace-mapping, safe-stable-stringify, get-port produced its
      # own PR -- ~7+ PRs/week reviewing churn on the prod surface. Majors stay
      # standalone (breaking changes warrant individual review).
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
