# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  # Allow re-running the matrix on demand without pushing a new commit
  # (handy when re-validating after CI infrastructure changes).
  workflow_dispatch:

# Least-privilege default. The CI workflow only needs to read the repo to
# build and test; jobs that need additional scopes should opt in explicitly.
permissions:
  contents: read

# Cancel in-flight runs on the same ref when a new commit lands. Saves CI
# minutes and avoids double-publishing intermediate artifacts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Bound the job so a hung integration test (real Node.js inspector debuggee) cannot
    # eat the GitHub Actions default 6h budget and block the runner queue.
    timeout-minutes: 25

    # `id-token: write` is required for the Codecov OIDC upload below.
    # `contents: read` repeats the workflow-level default explicitly, since
    # adding any job-level `permissions:` block resets all unspecified scopes
    # to none.
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        # engines.node is >=22; 24 is the version published from npm-publish.yml.

    steps:
    # actions/checkout pinned to v6.0.2 commit SHA — pinning to commit SHA
    # rather than @v6 means a compromised maintainer cannot re-point the
    # major tag at malicious code; bumps require an explicit PR.
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Use Node.js ${{ matrix.node-version }}
      # actions/setup-node pinned to v6.4.0 commit SHA (see note above).
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    # Typecheck both src and tests via tsconfig.json (build only checks src).
    # Tests transpile-only under vitest, so a type error there would otherwise
    # ship to whoever runs the tests next.
    - run: npm run typecheck
    - run: npm run build
    - run: npm run test:coverage

    - name: Upload coverage to Codecov
      # Run on a single matrix entry — uploading the same report twice
      # under different Node versions just creates noise on the Codecov side
      # without changing what we measure.
      if: matrix.node-version == '22.x'
      # codecov/codecov-action pinned to v6.0.1 commit SHA (not tag object SHA,
      # which can be re-pointed — only commit SHAs are immutable references).
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        # OIDC removes the need for a long-lived CODECOV_TOKEN secret —
        # the action exchanges a short-lived GitHub-issued JWT for an
        # upload credential, which Codecov verifies by repository claim.
        use_oidc: true
        files: ./coverage/lcov.info
        flags: unit
        # Disable auto-discovery so this upload only sends the named file —
        # otherwise the integration lcov.info (generated by the next step on
        # the same workspace) would also be captured here under flag `unit`.
        disable_search: true
        # Don't fail the build on Codecov outages — coverage drift is
        # signal, not a release blocker.
        fail_ci_if_error: false

    - name: Run integration tests
      # Step-level cap: integration normally finishes in ~9 min on CI. If it
      # hangs (real Node.js inspector debuggee + sockets), fail the step at 18
      # so the job can still finish below its 25-minute job timeout instead of
      # eating the whole budget on a single stuck test.
      #
      # `NODE_V8_COVERAGE` makes every Node.js process in the suite (vitest
      # worker, the spawned MCP server child via `dist/index.js`, and the
      # spawned test-app debuggee) dump v8 coverage JSON to that directory.
      # The vitest worker itself runs almost no `src/*` code — the modules
      # under test execute exclusively in those child processes — so we have
      # to harvest coverage from there. See the c8 report step below.
      timeout-minutes: 18
      env:
        NODE_V8_COVERAGE: ${{ github.workspace }}/coverage-integration-raw
      run: |
        rm -rf "$NODE_V8_COVERAGE"
        mkdir -p "$NODE_V8_COVERAGE"
        npm run test:integration

    - name: Generate integration coverage report (c8)
      # Merge the per-process v8 coverage JSON dumps into a single lcov.info,
      # source-map-remapped back to `src/*.ts` (tsconfig.base.json sets
      # `sourceMap: true`, so dist/*.js.map exists and c8 picks it up
      # automatically). `--include 'dist/**/*.js'` matches the actually-run
      # bundle; the remap converts file paths in the report to `src/*.ts`.
      if: matrix.node-version == '22.x'
      run: |
        ./node_modules/.bin/c8 report \
          --reporter=text-summary \
          --reporter=lcov \
          --report-dir=coverage-integration \
          --temp-directory=./coverage-integration-raw \
          --src=. \
          --all \
          --include='dist/**/*.js' \
          --exclude='dist/index.js'

    - name: Upload integration coverage to Codecov
      # Same single-matrix-entry policy as the unit upload above, but tagged
      # with `flags: integration` so Codecov can show a unit-vs-integration
      # breakdown alongside the merged total.
      if: matrix.node-version == '22.x'
      # codecov/codecov-action pinned to v6.0.1 commit SHA (see note above).
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
      with:
        use_oidc: true
        files: ./coverage-integration/lcov.info
        flags: integration
        # Disable auto-discovery so this upload only sends the integration
        # report — otherwise `coverage/lcov.info` (still on disk from the
        # earlier unit run) would be re-uploaded here under flag `integration`.
        disable_search: true
        fail_ci_if_error: false

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    # actions/checkout pinned to v6.0.2 commit SHA (see build job above).
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    # actions/setup-node pinned to v6.4.0 commit SHA (see build job above).
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
      with:
        node-version: 22.x
        cache: 'npm'

    - run: npm ci

    # Production deps reach end users via the published package, so a high
    # or critical advisory there fails the build until it's resolved
    # (upgrade, override in package.json, or accepted-risk note in PR).
    - name: Audit production dependencies
      run: npm audit --omit=dev --audit-level=high

    # Dev-only advisories (build tooling, test runners) don't ship to
    # users — keep them visible in the run log but don't block PRs on
    # transient upstream advisories that have no production exposure.
    - name: Audit all dependencies (advisory only)
      run: npm audit --audit-level=high
      continue-on-error: true
