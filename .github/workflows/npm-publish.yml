# Publish to npm on every vX.Y.Z tag. Aligned with the other MCP servers
# (mongo / pg / yt), all of which trigger publish on tag push so the release
# action is "git tag vX.Y.Z && git push --tags" with no extra GitHub-side step.

name: Node.js Package

on:
  push:
    tags:
      - 'v*'

# Serialise tag-triggered publishes so two concurrent tags can't race each
# other through `npm publish --provenance`. Disable cancel-in-progress: a
# half-finished release is worse than waiting for the previous one to finish.
concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Bound the publish gate so a hung integration test (real Node.js inspector
    # debuggee) cannot eat the GitHub Actions default 6h budget. Mirrors the
    # 25-min cap in node.js.yml.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Run integration tests
        # Gate the publish on the same integration suite that node.js.yml runs
        # against master/PRs. Without this, a regression that breaks integration
        # but passes unit tests + smoke install would still be published.
        # Step-level cap mirrors node.js.yml: integration normally finishes in
        # ~9 min on CI; fail the step at 18 so the job can still finish below
        # its 25-min budget instead of being killed mid-publish-prep.
        timeout-minutes: 18
        run: npm run test:integration

      - name: Smoke pack-and-install
        # Build a real tarball, install it into a clean throwaway project, and
        # exercise the bin entry. Catches issues that `npm pack --dry-run` can't:
        # missing files in the `files` allow-list, broken shebang, missing
        # runtime dependencies, wrong `bin` path. Tarball is discarded — the
        # actual publish below repacks from source.
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_TARBALL="$(npm pack --silent | tail -n 1)"
          echo "Built tarball: ${PACKAGE_TARBALL}"
          SMOKE_DIR="$(mktemp -d)"
          pushd "${SMOKE_DIR}" > /dev/null
          npm init -y > /dev/null
          npm install "${GITHUB_WORKSPACE}/${PACKAGE_TARBALL}" --no-save
          npx --no-install mcp-chrome-debugger-protocol --help || true
          popd > /dev/null
          rm -rf "${SMOKE_DIR}" "${PACKAGE_TARBALL}"
          echo "Smoke install OK"

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/
          # Cache deliberately disabled for OIDC trusted publishers compatibility
          # (see commit 4ae9f2a). Re-evaluate when actions/setup-node updates this.
          package-manager-cache: false
      - run: node --version && npm --version
      - run: npm ci
      - run: npm publish --provenance --access public
